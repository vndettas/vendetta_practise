<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <title>Error</title>
</head>
<body>
<main layout:fragment="content">

    <div class="bg-neutral-900 border-l-4 border-red-500 rounded shadow-lg max-w-2xl mx-auto mt-10 p-6">
        <h1 class="text-2xl font-bold mb-4 text-red-500">An Error Occurred</h1>
        <div class="font-mono bg-neutral-800 text-yellow-100 p-4 rounded border border-neutral-700 mb-6 whitespace-pre-wrap"
             th:text="${error != null ? error : 'Unknown error'}">
        </div>
        <a href="/TPOcodeFormatter/code" class="bg-yellow-300 hover:bg-yellow-400 text-black font-bold py-2 px-4 rounded transition duration-200 inline-block shadow-md">
            Return to formatter
        </a>
    </div>

</main>
</body>
</html>
