<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <title>Saved Code</title>
</head>
<body>
<main layout:fragment="content">

    <div class="bg-neutral-900 rounded-lg shadow-lg p-8 max-w-5xl mx-auto border border-neutral-700" th:if="${codeDTO}">
        <h2 class="text-2xl font-bold mb-6 text-center text-yellow-300">
            Saved Code <span class="text-yellow-500">(ID: <span th:text="${codeDTO.id}"></span>)</span>
        </h2>

        <div class="flex flex-col md:flex-row gap-6 w-full">
            <div class="flex-1 min-w-0 flex flex-col">
                <div class="text-center font-semibold mb-2 text-yellow-400">Before</div>
                <div class="border border-neutral-600 p-4 bg-neutral-800 overflow-x-auto flex-grow rounded">
                    <pre class="font-mono text-sm text-yellow-100" th:text="${codeDTO.codeBefore}"></pre>
                </div>
            </div>
            <div class="flex-1 min-w-0 flex flex-col">
                <div class="text-center font-semibold mb-2 text-yellow-400">After</div>
                <div class="border border-neutral-600 p-4 bg-neutral-800 overflow-x-auto flex-grow rounded">
                    <pre class="font-mono text-sm text-yellow-100" th:text="${codeDTO.codeAfter}"></pre>
                </div>
            </div>
        </div>

        <div class="mt-8 text-center">
            <a href="/TPOcodeFormatter/code" class="text-yellow-300 hover:text-yellow-400 hover:underline transition duration-200">← Format another code</a>
        </div>
    </div>

</main>
</body>
</html>
