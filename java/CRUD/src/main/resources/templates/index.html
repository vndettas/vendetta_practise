<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>ShortLink Manager</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .error-msg { color: #f87171; font-size: 0.875rem; margin-top: 0.25rem; }
    </style>
</head>
<body class="bg-gray-900 min-h-screen flex flex-col items-center pt-10 text-gray-100 font-sans">

<div class="w-full max-w-md flex justify-between items-center mb-6 px-2">
    <div>
        <a href="/manage" class="text-yellow-500 hover:text-yellow-400 font-bold transition duration-200" th:text="#{nav.manage}">
            Manage Link
        </a>
    </div>
    <div class="space-x-3 text-gray-400 font-medium text-sm">
        <a href="?lang=en" class="hover:text-yellow-500 transition duration-200">EN</a>
        <a href="?lang=pl" class="hover:text-yellow-500 transition duration-200">PL</a>
        <a href="?lang=de" class="hover:text-yellow-500 transition duration-200">DE</a>
        <a href="?lang=it" class="hover:text-yellow-500 transition duration-200">IT</a>
    </div>
</div>

<div class="bg-gray-800 p-8 rounded-xl shadow-2xl w-full max-w-md border border-gray-700">
    <h1 class="text-2xl font-bold mb-6 text-white" th:text="#{nav.create}">Create Link</h1>

    <div th:if="${param.success}" class="bg-green-900/50 border border-green-500 text-green-400 p-3 rounded mb-6 text-center" th:text="#{msg.success}">
        Successfully created!
    </div>

    <form action="#" th:action="@{/create}" th:object="${linkDto}" method="post" class="space-y-5">

        <div>
            <label class="block text-sm font-medium text-gray-300 mb-1" th:text="#{form.name}">Name:</label>
            <input type="text" th:field="*{name}" class="block w-full bg-gray-700 border border-gray-600 rounded p-2.5 text-white placeholder-gray-400 focus:ring-2 focus:ring-yellow-500 focus:border-yellow-500 focus:outline-none transition">
            <p th:if="${#fields.hasErrors('name')}" th:errors="*{name}" class="error-msg"></p>
        </div>

        <div>
            <label class="block text-sm font-medium text-gray-300 mb-1" th:text="#{form.url}">Target URL:</label>
            <input type="text" th:field="*{targetUrl}" placeholder="https://..." class="block w-full bg-gray-700 border border-gray-600 rounded p-2.5 text-white placeholder-gray-400 focus:ring-2 focus:ring-yellow-500 focus:border-yellow-500 focus:outline-none transition">
            <p th:if="${#fields.hasErrors('targetUrl')}" th:errors="*{targetUrl}" class="error-msg"></p>
        </div>

        <div>
            <label class="block text-sm font-medium text-gray-300 mb-1" th:text="#{form.password}">Password (optional):</label>
            <input type="password" th:field="*{password}" class="block w-full bg-gray-700 border border-gray-600 rounded p-2.5 text-white placeholder-gray-400 focus:ring-2 focus:ring-yellow-500 focus:border-yellow-500 focus:outline-none transition">
            <p th:if="${#fields.hasErrors('password')}" th:errors="*{password}" class="error-msg"></p>
        </div>

        <button type="submit" class="w-full bg-yellow-500 text-gray-900 font-bold py-3 px-4 rounded-lg hover:bg-yellow-400 transition duration-200 shadow-lg mt-2" th:text="#{form.submit}">
            Create
        </button>
    </form>
</div>
</body>
</html>
