<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Manage Link - Details</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 min-h-screen flex flex-col items-center pt-10 text-gray-100 font-sans pb-10">

<div class="w-full max-w-md flex justify-between items-center mb-6 px-2">
    <a href="/" class="text-yellow-500 hover:text-yellow-400 font-bold transition duration-200" th:text="#{nav.create}">
        &larr; Back to Create
    </a>
</div>

<div class="bg-gray-800 p-8 rounded-xl shadow-2xl w-full max-w-md border border-gray-700">
    <h2 class="text-2xl font-bold mb-6 text-white" th:text="#{nav.manage}">Manage Link</h2>

    <div class="bg-gray-700 border border-gray-600 p-5 rounded-lg mb-8 shadow-inner">
        <p class="text-sm text-gray-400 mb-2">Short Link ID: <span class="font-bold text-white text-base ml-1" th:text="${link.id}"></span></p>
        <p class="text-sm text-gray-400 mb-4">Total Visits: <span class="font-bold text-yellow-500 text-lg ml-1" th:text="${link.visits}"></span></p>
        <p class="text-sm text-gray-400 mb-1">Redirection URL:</p>
        <a th:href="@{'/red/' + ${link.id}}" target="_blank"
           class="text-yellow-500 hover:text-yellow-400 hover:underline break-all text-sm font-medium transition"
           th:text="'http://localhost:8080/red/' + ${link.id}"></a>
    </div>

    <form th:action="@{/manage/update/{id}(id=${link.id})}" method="post" class="space-y-5 mb-8 pb-8 border-b border-gray-700">
        <input type="hidden" name="password" th:value="${link.password}" />

        <div>
            <label class="block text-sm font-medium text-gray-300 mb-1" th:text="#{form.name}">Name</label>
            <input type="text" name="name" th:value="${link.name}" required="required"
                   class="block w-full bg-gray-700 border border-gray-600 rounded p-2.5 text-white focus:ring-2 focus:ring-yellow-500 focus:border-yellow-500 focus:outline-none transition" />
        </div>

        <div>
            <label class="block text-sm font-medium text-gray-300 mb-1" th:text="#{form.url}">Target URL</label>
            <input type="text" name="targetUrl" th:value="${link.targetUrl}" required="required"
                   class="block w-full bg-gray-700 border border-gray-600 rounded p-2.5 text-white focus:ring-2 focus:ring-yellow-500 focus:border-yellow-500 focus:outline-none transition" />
        </div>

        <button type="submit" th:text="#{form.update}"
                class="w-full bg-yellow-500 text-gray-900 font-bold py-3 px-4 rounded-lg hover:bg-yellow-400 transition duration-200 shadow-lg mt-2">
            Update Link
        </button>
    </form>

    <form th:action="@{/manage/delete/{id}(id=${link.id})}" method="post">
        <input type="hidden" name="password" th:value="${link.password}" />
        <button type="submit" th:text="#{form.delete}"
                onclick="return confirm('Are you sure you want to delete this link?');"
                class="w-full bg-red-600 border border-red-500 text-white font-bold py-3 px-4 rounded-lg hover:bg-red-500 transition duration-200 shadow-lg">
            Delete Link
        </button>
    </form>
</div>
</body>
</html>
