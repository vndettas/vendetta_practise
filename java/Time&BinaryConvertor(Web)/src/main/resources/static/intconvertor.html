<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Int Converter</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
<div class="card">
    <h2>Number Converter</h2>
    <form action="/convert" method="post">
        <input type="text" name="value" placeholder="Value (e.g. 255, JAVA)" required>
        <input type="number" name="from" placeholder="From Base (2-36)" min="2" max="36" required>
        <input type="number" name="to" placeholder="To Base (2-36)" min="2" max="36" required>
        <button type="submit" class="btn">Convert</button>
    </form>
</div>
</body>
</html>
